<!DOCTYPE html>
<html lang="en" data-theme="dark" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>365 Launch</title>
  <link rel="stylesheet" href="assets/tailwind.css">
</head>
<body>
  <main class="relative w-full overflow-hidden">
    <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 top-0 z-0 h-28 bg-gradient-to-br from-sky-500/15 via-cyan-400/10 to-transparent dark:from-sky-400/10 dark:via-cyan-300/5"></div>
    <section class="relative z-10 border-b border-slate-200/80 px-3 pb-3 pt-3 dark:border-slate-800">
      <div class="flex items-center gap-2">
        <button id="switch-btn" type="button" class="top-toggle" aria-pressed="false" aria-label="Toggle Apps or Admin view">
          <svg id="switch-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="h-4 w-4 shrink-0" aria-hidden="true">
            <path id="switch-icon-path" stroke-linecap="round" stroke-linejoin="round" d="M4.5 4.5h6v6h-6zm9 0h6v6h-6zm-9 9h6v6h-6zm9 0h6v6h-6z" />
          </svg>
          <span id="switch-label">Apps</span>
        </button>
        <button id="refresh-btn" type="button" class="top-toggle" aria-pressed="false" aria-label="Toggle refresh on tab focus">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="h-4 w-4 shrink-0 overflow-visible" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 1 1-3.3-6.9" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 3v6h-6" />
          </svg>
          Refresh
        </button>
        <div class="top-search-shell">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="top-search-icon" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m0 0A7.5 7.5 0 1 0 6 6a7.5 7.5 0 0 0 10.65 10.65Z" />
          </svg>
          <input id="icon-search" type="search" class="top-search" placeholder="Search" aria-label="Search icons">
        </div>
        <button id="about-icon" type="button" class="top-icon-button" aria-label="About 365 Launch">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
            <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0"/>

        </button>

          </svg>
        </button>
      </div>
      <p id="search-status" class="sr-only" aria-live="polite" aria-atomic="true"></p>
    </section>

    <section class="relative z-10 px-2 pb-2 pt-2">
      <div class="grid grid-cols-6 gap-3" id="apps-page"></div>
      <div class="hidden grid grid-cols-6 gap-3" id="admin-page"></div>
    </section>
  </main>

  <div id="about-modal" class="modal-shell overflow-y-auto" data-open="false" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="aboutModalLabel" aria-hidden="true">
    <div class="relative my-4 w-full max-w-md max-h-[calc(100dvh-2rem)] overflow-y-auto rounded-[28px] border border-slate-200 bg-white p-5 shadow-panel dark:border-slate-700 dark:bg-slate-900" data-modal-panel>
      <button type="button" data-close-modal class="absolute right-4 top-4 inline-flex h-8 w-8 items-center justify-center rounded-full border border-slate-200 text-slate-500 transition hover:border-slate-300 hover:text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-400 dark:border-slate-700 dark:text-slate-300 dark:hover:border-slate-600 dark:hover:text-slate-100" aria-label="Close about dialog">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
        </svg>
      </button>
      <div class="pr-10 text-center">
        <img src="images/logo_transparent_dark_200.png" alt="365 Launche logo for dark backgrounds" id="logo-dark" class="mx-auto mb-3 h-[30px]">
        <img src="images/logo_transparent_light_200.png" alt="365 Launcher logo for light backgrounds" id="logo-light" class="mx-auto mb-3 h-[30px] hidden">
        <h2 id="aboutModalLabel" class="text-lg font-semibold text-slate-900 dark:text-slate-50">365 Launcher</h2>
        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">Copyright © 2026 Cloudrun Ltd</p>
      </div>
      <div class="mt-6 space-y-6 text-left">
        <section>
          <h3 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Help and Support</h3>
          <div class="mt-3 flex flex-col gap-2">
            <a href="https://cloudrun.co.uk/software/365launcher/" target="_blank" class="panel-button">User guide</a>
            <a href="https://ko-fi.com/halsc" target="_blank" class="panel-button">Buy Me a Coffee</a>
            <a href="https://cloudrun.co.uk/software/365launcher/#leave-a-review" target="_blank" class="panel-button">Leave a Review</a>
          </div>
        </div>
        <section>
          <h3 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Share</h3>
          <div class="mt-3 grid grid-cols-2 gap-2">
            <a href="#" class="panel-button share-btn gap-2" data-platform="twitter">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-twitter-x" viewBox="0 0 16 16">

            </a>
            <a href="#" class="panel-button share-btn gap-2" data-platform="linkedin">

              </svg> LinkedIn
            </a>
            <a href="#" class="panel-button share-btn gap-2" data-platform="reddit">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-reddit" viewBox="0 0 16 16">

              </svg> Reddit
            </a>
            <a href="#" class="panel-button share-btn gap-2" data-platform="facebook">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-facebook" viewBox="0 0 16 16">
                <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
              </svg> Facebook
            </a>
          </div>
        </section>
        <section>
          <h3 class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Version Information</h3>
          <div class="mt-3 space-y-2 text-sm text-slate-600 dark:text-slate-300">
            <p id="version"></p>
            <p id="release-date"></p>
            <p>Released under the <a href="https://mozilla.org/MPL/2.0/" target="_blank" class="font-medium text-sky-700 hover:text-sky-800 dark:text-sky-300 dark:hover:text-sky-200">Mozilla Public License Version 2.0</a></p>
            <ul id="changes-list" class="space-y-1"></ul>
          </div>
          <a href="https://github.com/cloudhal/365Launcher" class="panel-button mt-3 gap-2" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">

            </svg> GitHub
          </a>
        </section>
      </div>
    </div>
  </div>
  <div id="settings-modal" class="modal-shell" data-open="false" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="settingsModalLabel" aria-hidden="true">
    <div class="relative w-full max-w-sm rounded-[28px] border border-slate-200 bg-white p-5 shadow-panel dark:border-slate-700 dark:bg-slate-900" data-modal-panel>
      <button type="button" data-close-modal class="absolute right-4 top-4 inline-flex h-8 w-8 items-center justify-center rounded-full border border-slate-200 text-slate-500 transition hover:border-slate-300 hover:text-slate-800 focus:outline-none focus:ring-2 focus:ring-sky-400 dark:border-slate-700 dark:text-slate-300 dark:hover:border-slate-600 dark:hover:text-slate-100" aria-label="Close settings dialog">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
        </svg>
      </button>
      <h2 id="settingsModalLabel" class="text-lg font-semibold text-slate-900 dark:text-slate-50">Settings</h2>
      <div class="mt-5 space-y-4">
        <div>
          <label for="tab-mode" class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-200">Tab mode</label>
          <select id="tab-mode" class="panel-select">
            <option value="individual">Individual</option>
            <option value="new">New</option>
            <option value="single">Single</option>
          </select>
        </div>
        <div>
          <label for="theme" class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-200">Theme</label>
          <select id="theme" class="panel-select">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <label class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-3 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-800/80 dark:text-slate-200" for="debug-mode">
          <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-sky-600 focus:ring-sky-500 dark:border-slate-600 dark:bg-slate-900 dark:focus:ring-sky-400" id="debug-mode">
          <span>Enable Debug Mode</span>
        </label>
      </div>
      <div class="mt-6 flex justify-end gap-2">
        <button type="button" class="panel-button-secondary" data-close-modal>Close</button>
        <button type="button" class="panel-button" id="save-settings">Save</button>
      </div>
    </div>
  </div>
        
  <div id="status-bar" class="status-bar" role="status" aria-live="polite" aria-atomic="true"></div>
        
  <script src="popup.js"></script>
</body>
</html>
